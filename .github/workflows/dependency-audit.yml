name: Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip pip-audit
      - run: python scripts/check_dependency_audit.py
      # Keep the JavaScript result visible if the Python gate finds a new or
      # expired dependency advisory; the job still fails overall on that step.
      - if: always()
        run: npm ci
      - if: always()
        run: npm audit --omit=dev --audit-level=high
