services:
  apollo:
    build: .
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-7000}:7000"
    volumes:
      - ./data:/app/data:z
      - ./logs:/app/logs:z
      # Default apollo-backup output is /app/backups. Bind it explicitly so
      # snapshots survive an Apollo container recreation.
      - ./backups:/app/backups:z
      # Cookbook remote-server SSH identity. Apollo can generate a key here;
      # add the shown public key to each remote server's authorized_keys.
      - ./data/ssh:/app/.ssh:z
      # Cookbook local model cache. Inside Docker, "Local" means the Apollo
      # container, so persist its HuggingFace cache under ./data/huggingface.
      - ./data/huggingface:/app/.cache/huggingface:z
      # Cookbook-installed Python CLIs/packages (vLLM, llama-cpp-python, etc.)
      # land under /app/.local for the apollo user. Persist them so a
      # container recreate does not silently remove installed serve engines.
      - ./data/local:/app/.local:z
    extra_hosts:
      # Lets the container reach local services on the Docker host, including
      # Ollama at http://host.docker.internal:11434.
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_HOST=${LLM_HOST:-localhost}
      - LLM_HOSTS=${LLM_HOSTS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - RESEARCH_LLM_ENDPOINT=${RESEARCH_LLM_ENDPOINT:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - SEARXNG_INSTANCE=http://searxng:8080
      # Keep ChromaDB embedded in Apollo's persisted data directory. ChromaDB
      # currently has an upstream pre-auth HTTP-server advisory without a
      # released fix; no Chroma HTTP service is started or published here.
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - LOCALHOST_BYPASS=${LOCALHOST_BYPASS:-false}
      - APOLLO_ADMIN_USER=${APOLLO_ADMIN_USER:-admin}
      - APOLLO_ADMIN_PASSWORD=${APOLLO_ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - EMBEDDING_URL=${EMBEDDING_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - FASTEMBED_MODEL=${FASTEMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - FASTEMBED_CACHE_PATH=${FASTEMBED_CACHE_PATH:-}
      - CLEANUP_INTERVAL_HOURS=${CLEANUP_INTERVAL_HOURS:-24}
      - APOLLO_INPROCESS_POLLERS=${APOLLO_INPROCESS_POLLERS:-1}
      - APOLLO_INPROCESS_TASKS=${APOLLO_INPROCESS_TASKS:-1}
      - APOLLO_SCRIPT_HOST=${APOLLO_SCRIPT_HOST:-localhost}
      - DATA_BRAVE_API_KEY=${DATA_BRAVE_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_PSE_CX=${GOOGLE_PSE_CX:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      # PUID / PGID — the user/group the container drops to before
      # running uvicorn (entrypoint also chowns /app/data + /app/logs
      # to match, so bind-mounted files stay editable from the host).
      # 1000 is the default first user on most Linux installs. If your
      # host user has a different id, override here or via .env, e.g.:
      #   PUID=1001
      #   PGID=1001
      # Find yours with:  id -u  /  id -g
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # Paperclip sidecar (opt-in). Apollo reverse-proxies it at /paperclip and
      # only reaches it on the internal network — the paperclip service has no
      # host port mapping of its own.
      - PAPERCLIP_ENABLED=${PAPERCLIP_ENABLED:-false}
      - PAPERCLIP_MODE=docker
      - PAPERCLIP_URL=http://paperclip:3100
      - PAPERCLIP_MODEL_ENDPOINT=${PAPERCLIP_MODEL_ENDPOINT:-ollama}
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped

  searxng:
    # Pinned, not :latest — apollo waits on searxng's healthcheck
    # (depends_on: condition: service_healthy), so a broken upstream `latest`
    # tag blocks the whole app from starting. 2026.6.2 crashes on boot with
    # `KeyError: 'default_doi_resolver'`, failing the healthcheck (issue #1414).
    # Bump this deliberately after verifying a newer tag boots clean.
    image: docker.io/searxng/searxng:2026.5.31-7159b8aed
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -s /etc/searxng/settings.yml ] || grep -q 'apollo-local-searxng-json-2026-05-30\|__SEARXNG_SECRET__' /etc/searxng/settings.yml; then
          secret="$${SEARXNG_SECRET:-}"
          if [ -z "$$secret" ]; then
            secret="$$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          fi
          sed "s|__SEARXNG_SECRET__|$$secret|g" /tmp/searxng-settings.yml.template > /etc/searxng/settings.yml
        fi
        exec /usr/local/searxng/entrypoint.sh
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - searxng-data:/etc/searxng
      - ./config/searxng/settings.yml:/tmp/searxng-settings.yml.template:ro,z
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
    # The official searxng image runs as the non-root `searxng` user, but its
    # entrypoint still needs to chown /etc/searxng on first boot, drop privs via
    # su-exec, and (with our wrapper above) write settings.yml into the named
    # volume. Without these capabilities the wrapper aborts at the redirection
    # with EACCES and the container fails its healthcheck with permission
    # errors during setup. Mirrors the cap set recommended by the upstream
    # searxng-docker compose file. See issue #721.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5).read(1)\""]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  ntfy:
    image: docker.io/binwiederhier/ntfy
    command: serve
    ports:
      - "${NTFY_BIND:-127.0.0.1}:8091:80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL:-http://localhost:8091}
    restart: unless-stopped

  # ── Paperclip (bundled agent-management UI) ──────────────────────────────
  # Opt-in: only do anything when PAPERCLIP_ENABLED=true in .env. Reached only
  # through Apollo's /paperclip reverse proxy — no host port is published.
  paperclip-db:
    profiles: ["paperclip"]
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - paperclip-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  paperclip:
    profiles: ["paperclip"]
    build:
      context: https://github.com/paperclipai/paperclip.git#v2026.529.0
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@paperclip-db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:${APP_PORT:-7000}/paperclip}"
      # Required when the paperclip profile is active. Soft default so a normal
      # `docker compose up` (feature off) never fails on a missing var; set this
      # in .env before `--profile paperclip up` (openssl rand -hex 32).
      BETTER_AUTH_SECRET: "${PAPERCLIP_AUTH_SECRET:-}"
      # opencode-local -> local model (Ollama on the host). Confirm exact keys
      # via the spike (S3) and adjust if opencode reads a different var.
      OPENAI_BASE_URL: "${PAPERCLIP_MODEL_BASE_URL:-http://host.docker.internal:11434/v1}"
      OPENAI_API_KEY: "${PAPERCLIP_MODEL_API_KEY:-local}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  searxng-data:
  ntfy-cache:
  paperclip-pgdata:
  paperclip-data:
